services:
  postgres:
    image: postgres:16-alpine
    container_name: SecretariaPay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-secretariapay_db}
      POSTGRES_USER: ${POSTGRES_USER:-secretariapay_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretariapay123}
    volumes:
      - SecretariaPay_postgres_data:/var/lib/postgresql/data
    networks:
      - SecretariaPay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secretariapay_user} -d ${POSTGRES_DB:-secretariapay_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secretariapay-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    volumes:
      - SecretariaPay_admission_payment_proofs:/app/data/admission-payment-proofs
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - SecretariaPay-network

volumes:
  SecretariaPay_postgres_data:
  SecretariaPay_admission_payment_proofs:

networks:
  SecretariaPay-network:
    driver: bridge
