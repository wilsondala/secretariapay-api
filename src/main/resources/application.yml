server:
  port: 8080

spring:
  application:
    name: secretariapay-api

  datasource:
    url: jdbc:postgresql://localhost:5432/secretariapay_db
    username: secretariapay_user
    password: secretariapay123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  security:
    jwt-secret: "secretariaPayBackendJwtSecretKeyForDevelopmentOnlyChangeInProduction2026"
    jwt-expiration-minutes: 1440

secretariapay:
  business:
    country: ${SECRETARIAPAY_BUSINESS_COUNTRY:AO}
    currency: ${SECRETARIAPAY_BUSINESS_CURRENCY:AOA}

  whatsapp:
    verify-token: ${SECRETARIAPAY_WHATSAPP_VERIFY_TOKEN:secretariapay-dev-token}
    enabled: ${SECRETARIAPAY_WHATSAPP_ENABLED:false}
    phone-number-id: ${SECRETARIAPAY_WHATSAPP_PHONE_NUMBER_ID:}
    access-token: ${SECRETARIAPAY_WHATSAPP_ACCESS_TOKEN:}
    graph-api-version: ${SECRETARIAPAY_WHATSAPP_GRAPH_API_VERSION:v25.0}
    graph-api-base-url: ${SECRETARIAPAY_WHATSAPP_GRAPH_API_BASE_URL:https://graph.facebook.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
