server:
  port: 8080

spring:
  application:
    name: secretariapay-api

  datasource:
    url: jdbc:postgresql://localhost:5432/secretariapay_db
    username: secretariapay_user
    password: secretariapay123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  security:
    jwt-secret: "secretariaPayBackendJwtSecretKeyForDevelopmentOnlyChangeInProduction2026"
    jwt-expiration-minutes: 1440

secretariapay:
  business:
    country: ${SECRETARIAPAY_BUSINESS_COUNTRY:AO}
    currency: ${SECRETARIAPAY_BUSINESS_CURRENCY:AOA}

  admissions:
    # Desativado por padrão. Ativar apenas em ambiente local ou homologação controlada.
    public-payment-pilot-enabled: ${SECRETARIAPAY_ADMISSIONS_PUBLIC_PAYMENT_PILOT_ENABLED:false}
    public-payment-due-days: ${SECRETARIAPAY_ADMISSIONS_PUBLIC_PAYMENT_DUE_DAYS:3}
    public-payment-environment-label: ${SECRETARIAPAY_ADMISSIONS_PUBLIC_PAYMENT_ENVIRONMENT_LABEL:HOMOLOGAÇÃO LOCAL}
    public-payment-provider: ${SECRETARIAPAY_ADMISSIONS_PUBLIC_PAYMENT_PROVIDER:BAI_TRANSFERENCIA_BANCARIA_PILOTO}
    # A expiração automática também permanece desativada por padrão.
    payment-expiry-enabled: ${SECRETARIAPAY_ADMISSIONS_PAYMENT_EXPIRY_ENABLED:false}
    payment-expiry-cron: ${SECRETARIAPAY_ADMISSIONS_PAYMENT_EXPIRY_CRON:0 15 * * * *}
    notifications:
      # O registo no outbox é sempre criado. O envio externo só ocorre quando habilitado.
      enabled: ${SECRETARIAPAY_ADMISSIONS_NOTIFICATIONS_ENABLED:false}
      recipient-whatsapp: ${SECRETARIAPAY_ADMISSIONS_NOTIFICATION_WHATSAPP:+244 991 640 259}
      internal-panel-url: ${SECRETARIAPAY_ADMISSIONS_INTERNAL_PANEL_URL:http://localhost:5173/admissions}
      max-attempts: ${SECRETARIAPAY_ADMISSIONS_NOTIFICATIONS_MAX_ATTEMPTS:5}
      dispatch-cron: ${SECRETARIAPAY_ADMISSIONS_NOTIFICATIONS_DISPATCH_CRON:*/15 * * * * *}

  enrollment:
    # A cobrança de matrícula nasce somente após inscrição paga e checklist aprovado.
    payment-due-days: ${SECRETARIAPAY_ENROLLMENT_PAYMENT_DUE_DAYS:3}
    payment-provider: ${SECRETARIAPAY_ENROLLMENT_PAYMENT_PROVIDER:BAI_TRANSFERENCIA_BANCARIA_PILOTO}

  payment:
    bank-name: ${SECRETARIAPAY_PAYMENT_BANK_NAME:Banco Angolano de Investimento}
    account-holder: ${SECRETARIAPAY_PAYMENT_ACCOUNT_HOLDER:OMNEN INTELENGENDA}
    iban: ${SECRETARIAPAY_PAYMENT_IBAN:AO06 0040 0000 6014 4677 1017 1}
    account-number: ${SECRETARIAPAY_PAYMENT_ACCOUNT_NUMBER:06014467710001}
    multicaixa-reference: ${SECRETARIAPAY_PAYMENT_MULTICAIXA_REFERENCE:Multicaixa Express / transferência bancária para a conta AKZ indicada}
    mobile-money-info: ${SECRETARIAPAY_PAYMENT_MOBILE_MONEY_INFO:Unitel Money/Afrimoney quando autorizado pela instituição}

  institution:
    whatsapp: ${SECRETARIAPAY_INSTITUTION_WHATSAPP:+244 991 640 259}
    financial-email: ${SECRETARIAPAY_INSTITUTION_FINANCIAL_EMAIL:secretaria.financeira@imetroangola.com}

  whatsapp:
    verify-token: ${SECRETARIAPAY_WHATSAPP_VERIFY_TOKEN:secretariapay-dev-token}
    enabled: ${SECRETARIAPAY_WHATSAPP_ENABLED:false}
    phone-number-id: ${SECRETARIAPAY_WHATSAPP_PHONE_NUMBER_ID:}
    access-token: ${SECRETARIAPAY_WHATSAPP_ACCESS_TOKEN:}
    graph-api-version: ${SECRETARIAPAY_WHATSAPP_GRAPH_API_VERSION:v25.0}
    graph-api-base-url: ${SECRETARIAPAY_WHATSAPP_GRAPH_API_BASE_URL:https://graph.facebook.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
