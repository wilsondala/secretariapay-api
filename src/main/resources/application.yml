server:
  port: 8080

spring:
  application:
    name: vairapido-api

  datasource:
    url: jdbc:postgresql://localhost:5432/vairapido_db
    username: vairapido_user
    password: vairapido123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  security:
    jwt-secret: "vaiRapidoBackendJwtSecretKeyForDevelopmentOnlyChangeInProduction2026"
    jwt-expiration-minutes: 1440

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always