name: Backend Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run critical financial and document tests
        shell: bash
        run: |
          set -o pipefail
          mvn -B -Dstyle.color=never \
            -Dtest=OfficialDocumentBrandingAspectTest,AcademicDocumentPdfServiceTest,AcademicDocumentServiceTest,AcademicServiceOrderServiceTest,AcademicServiceOrderControllerPermissionsTest,AcademicServiceOrderStatusContractTest,AcademicServicesWhatsappFlowAspectTest,ChargeClassificationServiceTest,SecretariaPayFinancialProductionGuardAspectTest \
            test > /tmp/critical-tests.log 2>&1

      - name: Upload critical test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critical-test-log
          path: /tmp/critical-tests.log
          if-no-files-found: ignore
          retention-days: 2

      - name: Compile and package
        shell: bash
        run: |
          mvn -B -Dstyle.color=never -DskipTests clean package > /tmp/package.log 2>&1

      - name: Upload package log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-log
          path: /tmp/package.log
          if-no-files-found: ignore
          retention-days: 2
