name: Backend Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run academic document tests
        run: mvn -B -Dtest=AcademicDocumentServiceTest,AcademicDocumentPdfServiceTest,AcademicServicesWhatsappFlowAspectTest,AcademicServicesInteractiveMenuTest,WhatsappInteractiveMenuFactoryTest,SecretariaPayWhatsappWebhookServiceInteractiveTest test

      - name: Compile and package
        run: mvn -B -DskipTests clean package
