name: Apply tuition consolidation patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/consolidar-propinas-referencia
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Apply consolidation changes
        run: python3 .github/scripts/apply_tuition_consolidation.py

      - name: Validate Maven package
        id: maven
        shell: bash
        run: |
          chmod +x mvnw
          set +e
          ./mvnw clean package -DskipTests > /tmp/maven.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 220 /tmp/maven.log > .github/maven-consolidation-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f .github/maven-consolidation-diagnostic.txt
            git commit -m "ci: registrar diagnóstico da consolidação financeira"
            git push origin HEAD:fix/consolidar-propinas-referencia
            exit "$status"
          fi

      - name: Commit validated changes
        run: |
          git rm .github/patches/consolidate-tuition-reference.patch
          git rm .github/scripts/apply_tuition_consolidation.py
          git rm .github/workflows/apply-consolidation-patch.yml
          rm -f .github/maven-consolidation-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src .github
          git commit -m "fix: liquidar propina sem duplicar referência"
          git push origin HEAD:fix/consolidar-propinas-referencia
