name: Apply tuition consolidation patch

on:
  push:
    branches:
      - fix/consolidar-propinas-referencia
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/consolidar-propinas-referencia
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Apply consolidation patch
        run: |
          git apply --check .github/patches/consolidate-tuition-reference.patch
          git apply .github/patches/consolidate-tuition-reference.patch
          git rm .github/patches/consolidate-tuition-reference.patch
          git rm .github/workflows/apply-consolidation-patch.yml

      - name: Validate Maven build and tests
        run: |
          chmod +x mvnw
          ./mvnw clean test

      - name: Commit validated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "fix: liquidar propina sem duplicar referência"
          git push origin HEAD:fix/consolidar-propinas-referencia
