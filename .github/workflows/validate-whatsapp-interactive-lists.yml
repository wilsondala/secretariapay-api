name: Validate WhatsApp interactive lists

on:
  push:
    branches:
      - feat/whatsapp-interactive-lists
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run interactive WhatsApp tests
        run: mvn -B -Dtest=WhatsappInteractiveMenuFactoryTest,SecretariaPayWhatsappWebhookServiceInteractiveTest test

      - name: Build backend
        run: mvn -B -DskipTests package
