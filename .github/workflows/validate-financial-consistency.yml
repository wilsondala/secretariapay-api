name: Validate financial consistency

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/consolidar-propinas-referencia

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run focused financial tests
        run: mvn -B -Dtest=TuitionChargeSettlementServiceTest,ChargeServiceTest test
