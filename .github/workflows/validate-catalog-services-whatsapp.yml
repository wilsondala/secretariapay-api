name: Validate catalog services WhatsApp

on:
  push:
    branches:
      - feat/catalog-prices-whatsapp-services
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run focused tests
        run: mvn -B -Dtest=WhatsappInteractiveMenuFactoryTest,SecretariaPayWhatsappWebhookServiceInteractiveTest test

      - name: Build backend
        run: mvn -B -DskipTests package
